    <title>Test Luchino</title>

<body>
    
    <div class="controls-mobile">
        <button class="btn-joy up" onclick="changeDir('up')">▲</button>

    <div class="punteggio"></div>
    <div class="map">
    </div>
    <div class="leaderboard">
        <h2>Classifica</h2>

    </div>
